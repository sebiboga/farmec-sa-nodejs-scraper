name: WebScraper FARMEC to Peviitor

on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '24'

      - name: Cleanup wrong CIF data
        env:
          SOLR_AUTH: ${{ secrets.SOLR_AUTH }}
        run: |
          curl -s --user "${SOLR_AUTH}" \
            "https://solr.peviitor.ro/solr/job/update?commit=true" \
            -X POST \
            -H "Content-Type: application/json" \
            --data-binary '{"delete":{"query":"cif:40648509"}}' || true

      - name: Install dependencies
        run: npm install

      - name: Run scraper
        run: node index.js
        env:
          SOLR_AUTH: ${{ secrets.SOLR_AUTH }}

      - name: Check for new jobs
        run: |
          if [ -f jobs.json ]; then
            echo "New jobs found:"
            cat jobs.json | jq '.jobs | length'
          else
            echo "No new jobs or scrape failed"
          fi

      - name: Upload jobs JSON
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: scraped-jobs
          path: |
            jobs.json
            jobs_existing.json
          retention-days: 7
